	<h2>Generate Hyperlink For Testing</h2>

<input type="text" id="urlInput" placeholder="Enter URL (e.g. https://google.com)" size="40">
<button onclick="createLink()">Create Link</button>

<div id="result"></div>
	
	<script>
function createLink() {
    let url = document.getElementById("urlInput").value.trim();

    if (!url) {
        alert("Please enter a URL");
        return;
    }


    const linkHTML = `<a href="${url}" target="_blank">${url}</a>`;
    document.getElementById("result").innerHTML = linkHTML;
}
</script>
